name: Release Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bundle with esbuild
        run: npx esbuild src/index.ts --bundle --platform=node --format=cjs --outfile=bundle/cx.cjs

      - name: Package Windows EXE
        run: npx @yao-pkg/pkg bundle/cx.cjs --target node22-win-x64 --output release/cx-windows.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/cx-windows.exe
          generate_release_notes: true
          body: |
            ## Windows 安装步骤

            1. 下载下方的 `cx-windows.exe`
            2. 将文件移动到任意目录（建议 `C:\tools\cx\`）
            3. 将该目录添加到系统 PATH（按 `Win + S` 搜索"编辑系统环境变量" → 环境变量 → Path → 新建）
            4. 打开新的命令提示符 / PowerShell，运行：
               ```
               cx login --token cx_pat_xxx.yyy
               cx whoami
               ```

            > 无需安装 Node.js，双击或在终端运行即可。
