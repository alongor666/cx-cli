name: Release verified cx binaries

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: cx-cli-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Verify immutable tag and package version
        run: |
          set -euo pipefail
          VERSION="$(node -p 'require("./package.json").version')"
          test "v${VERSION}" = "$RELEASE_TAG"
          test -s source-commit.txt

      - name: Install, test and build six verified assets
        run: |
          bun install --frozen-lockfile
          bun run test
          bun run package:release

      - name: Verify manifest and asset allowlist
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const crypto = require('node:crypto');
          const manifest = JSON.parse(fs.readFileSync('dist/manifest.json', 'utf8'));
          const pkg = require('./package.json');
          const expected = [
            'cx-darwin-arm64', 'cx-darwin-x64',
            'cx-linux-arm64', 'cx-linux-x64',
            'cx-windows-arm64.exe', 'cx-windows-x64.exe',
          ];
          if (manifest.version !== pkg.version) throw new Error('manifest version mismatch');
          if (manifest.sourceCommit !== fs.readFileSync('source-commit.txt', 'utf8').trim()) throw new Error('source commit mismatch');
          const actual = manifest.assets.map((asset) => asset.name).sort();
          if (JSON.stringify(actual) !== JSON.stringify([...expected].sort())) throw new Error(`asset allowlist mismatch: ${actual}`);
          for (const asset of manifest.assets) {
            const bytes = fs.readFileSync(`dist/${asset.name}`);
            const sha = crypto.createHash('sha256').update(bytes).digest('hex');
            if (sha !== asset.sha256) throw new Error(`sha256 mismatch: ${asset.name}`);
          }
          const sums = fs.readFileSync('dist/SHA256SUMS', 'utf8').trim().split('\n');
          if (sums.length !== expected.length) throw new Error('SHA256SUMS asset count mismatch');
          NODE

      - name: Create draft release with allowlisted assets only
        run: |
          gh release create "$RELEASE_TAG" \
            dist/cx-darwin-arm64 dist/cx-darwin-x64 \
            dist/cx-linux-arm64 dist/cx-linux-x64 \
            dist/cx-windows-arm64.exe dist/cx-windows-x64.exe \
            dist/manifest.json dist/SHA256SUMS \
            --verify-tag --draft --title "cx ${RELEASE_TAG}" --generate-notes

      - name: Verify draft assets and publish as Latest
        run: |
          set -euo pipefail
          EXPECTED="$(printf '%s\n' SHA256SUMS manifest.json cx-darwin-arm64 cx-darwin-x64 cx-linux-arm64 cx-linux-x64 cx-windows-arm64.exe cx-windows-x64.exe | sort)"
          ACTUAL="$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | sort)"
          test "$ACTUAL" = "$EXPECTED"
          gh release edit "$RELEASE_TAG" --draft=false --latest
